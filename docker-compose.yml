services:
  pg:
    restart: unless-stopped
    image: postgres:18
    shm_size: 1g
    container_name: tx-pg
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ./pginit.sql:/docker-entrypoint-initdb.d/init.sql
      - ./pgdata:/var/lib/postgresql/data
#    networks:
#      - termx
    ports:
      - 5432:5432

  termx-server:
    restart: unless-stopped
    image: ghcr.io/termx-health/termx-server:latest
    container_name: termx-server
    depends_on:
      pg:
        # The pg service's container_name is tx-pg, but compose's depends_on takes the
        # SERVICE name, not the container name. Earlier `- tx-pg` was technically a no-op
        # — compose silently treated it as a "depend on a service that doesn't exist" warning
        # in v1, and as an error-but-don't-block in v2. Switch to the real service key here.
        condition: service_started
      termx-minio-init:
        # Wait for the init container to finish creating the bob user + readwrite policy.
        # Without this the server can start before Minio knows about `bob`, fail its first
        # bucket-exists check, and crash any upload with "Access Key Id does not exist".
        condition: service_completed_successfully
    env_file:
      - server.env
#      - keycloak/server-keycloak.env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://termx-server:8200/health" ]
      interval: 1s
      timeout: 5s
      retries: 60
#    networks:
#      - termx
    ports:
      - 8200:8200
    mem_reservation: 2g

  termx-web:
    restart: unless-stopped
    image: ghcr.io/termx-health/termx-web:latest
    container_name: termx-web
    depends_on:
      - termx-server
    env_file:
      - web.env 
      - web-loginless.env
#      - keycloak/web-keycloak.env
#    networks:
#      - termx
    ports:
      - 4200:80

  # ---------------------------------------------------------------------------
  # Minio credentials are taken from minio.env so the root password isn't hard-
  # coded in this file and the init container can't drift out of sync with the
  # Minio container.
  #
  # minio.env (committed with defaults; OVERRIDE PER DEPLOYMENT):
  #   MINIO_ROOT_USER=minio
  #   MINIO_ROOT_PASSWORD=miniominio        # <-- replace in production
  #   BOB_MINIO_USER=bob                    # access key the server uses
  #   BOB_MINIO_PASSWORD=bobobobo           # secret key the server uses
  #
  # When you change MINIO_ROOT_PASSWORD on a deployment, also update
  # server.env's BOB_MINIO_SECRET_KEY only if you changed BOB_MINIO_PASSWORD.
  # The root password is used by the init container to TALK to Minio; the
  # server uses the per-app `bob` user, never the root user.
  # ---------------------------------------------------------------------------
  termx-minio:
    restart: unless-stopped
    image: quay.io/minio/minio:latest
    container_name: termx-minio
    command: server /data --console-address ":9001"
    env_file:
      - minio.env
    volumes:
      # Persist data across container restarts. Without this, every `docker compose down`
      # (and any container recreation) wiped the bob user the init container had created,
      # leaving the server with "The Access Key Id you provided does not exist" on the
      # first upload to /bob/objects.
      - ./miniodata:/data
    healthcheck:
      # Minio's own readiness probe — only returns 200 once the S3 API is up. The init
      # container waits for this via `condition: service_healthy` below, so we never run
      # `mc admin user add` against a half-booted server.
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
#    networks:
#      - termx
    ports:
      - 9100:9000
      - 9101:9001

  termx-minio-init:
    container_name: termx-minio-init
    restart: "no"
    image: quay.io/minio/mc
    env_file:
      - minio.env
    depends_on:
      termx-minio:
        condition: service_healthy
    entrypoint: /bin/sh
    # Idempotent provisioning — `|| true` on user/policy lets this container run cleanly
    # whether the user/policy were created on a previous start or not. The previous
    # `&&`-chained command would error out on re-run if `bob` already existed, leaving
    # subsequent re-provisioning steps unexecuted.
    #
    # Reads MINIO_ROOT_USER / MINIO_ROOT_PASSWORD from minio.env so it MUST stay in sync
    # with the Minio container's own credentials — single source of truth. Same goes for
    # BOB_MINIO_USER / BOB_MINIO_PASSWORD (used both here for provisioning and by the
    # server-side application in server.env's BOB_MINIO_ACCESS_KEY/SECRET_KEY).
    command: >-
      -c "
      set -e;
      mc alias set minio http://termx-minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
      (mc admin user add minio \"$$BOB_MINIO_USER\" \"$$BOB_MINIO_PASSWORD\" 2>&1 | grep -v 'already' || true);
      mc admin policy attach minio readwrite --user \"$$BOB_MINIO_USER\" 2>&1 | grep -v 'already attached' || true;
      echo \"bob ($$BOB_MINIO_USER) + readwrite policy provisioned\";
      "
#    networks:
#      - termx

  fsh-chef:
    restart: unless-stopped
    image: ghcr.io/termx-health/termx-chef:latest
    container_name: fsh-chef
#    networks:
#      - termx
    ports:
      - 8500:3000
    mem_reservation: 1g

  plantuml-server:
    restart: unless-stopped
    image: plantuml/plantuml-server:jetty
    container_name: plantuml-server
#    networks:
#      - termx
    ports:
      - 8501:8080

  termx-fml-editor:
    restart: unless-stopped
    image: ghcr.io/termx-health/termx-fml:latest
    container_name: termx-fml-editor
    env_file:
      - fml-editor.env
#    networks:
#      - termx
    ports:
      - 8502:80

#networks:
